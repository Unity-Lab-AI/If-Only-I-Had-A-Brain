# Unity brain — nginx vhost (PA.4.7). Operator deploy reference.
#
# Topology: this serves the STATIC frontend (donor page + chat/dashboard UI)
# AND reverse-proxies WSS to the persistent brain-server (the stateful backend
# that holds the weights + memory). The lab's wildcard cert + wildcard vhost
# already match *.git.unityailab.com — adapt/merge this into that setup; the
# server_name + cert lines below are illustrative.
#
# Forgejo auth (PA.4.2): the /admin path authenticates against Forgejo via
# auth_request and injects a trusted X-UAL-User header that brain-server reads
# (run brain-server with UAL_PROXY_AUTH=1 + BRAIN_BIND=127.0.0.1). The public
# donor/UI path carries NO such header and is compute/read-only. CRITICAL:
# X-UAL-User is STRIPPED on every inbound request so a client cannot spoof it.

upstream unity_brain {
    server 127.0.0.1:7525;   # brain-server.js (BRAIN_BIND=127.0.0.1)
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    # Per-repo pages subdomain (lowercased repo name). Rename if a cleaner
    # subdomain is wanted — hostnames are case-insensitive.
    server_name if-only-i-had-a-brain.git.unityailab.com;

    # ssl_certificate / ssl_certificate_key — use the box's wildcard
    # *.git.unityailab.com cert (already present per the lab pages setup).
    # ssl_certificate     /etc/letsencrypt/live/git.unityailab.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/git.unityailab.com/privkey.pem;

    # ── Defense-in-depth: never trust a client-supplied identity header ──
    # Strip X-UAL-User on EVERY inbound request before any location can set it.
    underscores_in_headers off;
    proxy_set_header X-UAL-User "";

    # ── Static frontend (donor page + UI) — served from the pages web root ──
    # Deployed by .forgejo/workflows/deploy.yml (SSH rsync). Public, no auth.
    root /var/www/if-only-i-had-a-brain;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Public donor / viewer WebSocket — compute-only, NO admin header ──
    # Donors (compute.html) + read-only viewers connect here. brain-server
    # treats the absence of X-UAL-User as donor/viewer (PA.4.2/PA.4.6).
    location /ws {
        proxy_pass http://unity_brain;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-UAL-User "";          # explicit: public lane is unauthenticated
        proxy_read_timeout 3600s;                # long-lived compute sockets
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── Admin WebSocket (operator — privileged access) — Forgejo-authenticated ──
    # auth_request validates the Forgejo session; on success the auth endpoint
    # returns the user, which we forward as the trusted X-UAL-User header.
    location /admin/ws {
        auth_request /_forgejo_auth;
        auth_request_set $ual_user $upstream_http_x_forwarded_user;

        proxy_pass http://unity_brain/ws;        # same backend WS endpoint
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-UAL-User $ual_user;    # proxy-vouched Forgejo identity
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── Forgejo auth subrequest ──
    # Operator: point this at the lab's Forgejo-backed auth check (oauth2-proxy
    # /oauth2/auth, or a Forgejo session-validation endpoint). It must return
    # 2xx for an authenticated lab member and set X-Forwarded-User to their
    # login; 401/403 otherwise. internal = not directly reachable by clients.
    location = /_forgejo_auth {
        internal;
        # proxy_pass http://127.0.0.1:4180/oauth2/auth;   # e.g. oauth2-proxy
        proxy_pass_request_body off;
        proxy_set_header Content-Length "";
        proxy_set_header X-Original-URI $request_uri;
    }
}
