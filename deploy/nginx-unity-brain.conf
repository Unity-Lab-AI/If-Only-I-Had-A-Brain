# Unity brain — nginx reverse-proxy vhost (operator deploy reference).
#
# IMPORTANT — adapt to YOUR box's TLS topology. This reference targets a box
# that already terminates :443 with an ssl_preread stream{} SNI-split and routes
# HTTP vhosts to 127.0.0.1:8444 ssl proxy_protocol (the setup on the lab host).
# DO NOT add a `listen 443` server here — :443 is already owned by the stream
# splitter; a second :443 vhost would conflict and break the box. This vhost ONLY
# reverse-proxies the brain-server's WebSocket + admin lanes. The STATIC frontend
# (index + html/*) is already served by the existing wildcard-pages vhost from
# /var/www/pages/<repo> — DO NOT serve static here.
#
# If your box instead owns :443 directly, change the listen line to
# `listen 443 ssl;` + add the cert lines, and (optionally) a static `root` +
# `location /` — but on the lab host, keep the :8444 proxy_protocol form below.
#
# Auth: there is NO oauth2-proxy / Forgejo auth_request on this box yet, so the
# admin lane is gated with nginx HTTP BASIC AUTH instead — the brain-server only
# needs a trusted `X-UAL-User` header, and `$remote_user` (the basic-auth login)
# supplies it. Swap to Forgejo/oauth2-proxy later with zero backend change. Run
# the brain-server with UAL_PROXY_AUTH=1 + BRAIN_BIND=127.0.0.1. CRITICAL:
# X-UAL-User is STRIPPED on every inbound request so a client cannot spoof it.

upstream unity_brain {
    server 127.0.0.1:7525;   # brain-server.js (BRAIN_BIND=127.0.0.1)
}

server {
    # Lab host: behind the :443 ssl_preread stream split → HTTP vhosts listen on
    # loopback :8444 with PROXY protocol. proxy_pass to the backend below is a
    # PLAIN proxy (no proxy_protocol downstream — the brain-server's ws server
    # doesn't speak it). The backend sees the connection as 127.0.0.1 (nginx),
    # which is exactly what UAL_PROXY_AUTH=1 wants — admin is decided by the
    # injected X-UAL-User header, not by loopback.
    listen 127.0.0.1:8444 ssl proxy_protocol;
    server_name if-only-i-had-a-brain.git.unityailab.com;
    absolute_redirect off;

    # Wildcard cert already on the box (*.git.unityailab.com). Point these at it:
    # ssl_certificate     /etc/letsencrypt/live/git.unityailab.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/git.unityailab.com/privkey.pem;

    # ── Defense-in-depth: never trust a client-supplied identity header ──
    underscores_in_headers off;
    proxy_set_header X-UAL-User "";

    # NOTE: no `root` / `location /` here — the static frontend is served by the
    # existing wildcard-pages vhost (/var/www/pages/<repo>). This vhost is
    # proxy-only. Requests that aren't /ws or /admin/* should fall through to the
    # pages vhost via your SNI/location precedence; this server only adds the
    # brain lanes.

    # ── Public donor / viewer WebSocket — compute-only, NO admin header ──
    # compute.html donors + read-only viewers. Absence of X-UAL-User → viewer/
    # donor (the brain-server validates + quarantines donor results, so this lane
    # is safe to expose unauthenticated).
    location /ws {
        proxy_pass http://unity_brain;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-UAL-User "";          # explicit: public lane is unauthenticated
        proxy_read_timeout 3600s;                # long-lived compute sockets
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── Admin WebSocket (operator) — nginx HTTP Basic auth ──
    # `htpasswd -c /etc/nginx/unity-admin.htpasswd <operator>` → one operator
    # login. $remote_user (the authenticated login) becomes the trusted
    # X-UAL-User the brain-server reads; first authed connection = locked master.
    # Browser wrinkle: browsers do NOT pop a Basic-auth dialog on a raw WebSocket
    # handshake — prime the credentials once by visiting any /admin/ HTTP URL
    # first (e.g. https://<host>/admin/milestone), then the dashboard's
    # wss://<host>/admin/ws reuses the cached credentials.
    location /admin/ws {
        auth_basic "Unity admin";
        auth_basic_user_file /etc/nginx/unity-admin.htpasswd;

        proxy_pass http://unity_brain/ws;        # same backend WS endpoint
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-UAL-User $remote_user; # basic-auth login = authed operator
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
        proxy_buffering off;
    }

    # ── Admin HTTP REST endpoints (operator controls) — same Basic auth ──
    # The dashboard's control endpoints (auto-advance / shutdown / milestone /
    # grade-advance / grade-signoff / autoscale) are fetched same-origin under
    # /admin/<endpoint>. Trailing slash on proxy_pass strips the /admin/ prefix
    # so they hit the brain-server's root routes.
    location /admin/ {
        auth_basic "Unity admin";
        auth_basic_user_file /etc/nginx/unity-admin.htpasswd;

        proxy_pass http://unity_brain/;          # trailing slash strips the /admin/ prefix
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-UAL-User $remote_user; # basic-auth login = authed operator
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ── Later: swap Basic auth for Forgejo/oauth2-proxy ──
    # When an auth backend exists, replace the two `auth_basic*` lines in the
    # /admin/ blocks with:
    #   auth_request /_forgejo_auth;
    #   auth_request_set $ual_user $upstream_http_x_forwarded_user;
    # set X-UAL-User to $ual_user, and add this internal subrequest:
    # location = /_forgejo_auth {
    #     internal;
    #     proxy_pass http://127.0.0.1:4180/oauth2/auth;   # oauth2-proxy
    #     proxy_pass_request_body off;
    #     proxy_set_header Content-Length "";
    #     proxy_set_header X-Original-URI $request_uri;
    # }
}
