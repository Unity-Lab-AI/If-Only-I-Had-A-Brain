  <meta name="twitter:description" content="Every project markdown doc rendered live in the browser — same canonical .md files, web view.">
  <meta name="twitter:image" content="https://if-only-i-had-a-brain.git.unityailab.com/assets/social/docs.png">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📄</text></svg>">
  <style>
    * { box-sizing: border-box; }
    body {
      background: #0a0f12;
      color: #e5e7eb;
      font-family: 'JetBrains Mono', 'Fira Code', Consolas, 'Courier New', monospace;
      margin: 0;
      padding: 0;
      line-height: 1.65;
    }
    .topbar {
      position: sticky;
      top: 0;
      background: rgba(10, 15, 18, 0.96);
      border-bottom: 1px solid #1f2937;
      padding: 10px 18px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
      z-index: 100;
      backdrop-filter: blur(6px);
    }
    .topbar a, .topbar select {
      color: #ff4d9a;
      text-decoration: none;
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 4px;
      border: 1px solid #374151;
      background: #0f1a1f;
      font-family: inherit;
    }
    .topbar a:hover, .topbar select:hover { background: #1f2937; }
    .topbar select { color: #e5e7eb; cursor: pointer; }
    .topbar .lede { color: #6b7280; font-size: 11px; margin-left: auto; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 24px; }
    h1 { color: #ff4d9a; margin: 28px 0 12px; font-size: 26px; line-height: 1.3; }
    h2 { color: #22c55e; margin: 32px 0 12px; font-size: 19px; border-bottom: 1px solid #1f2937; padding-bottom: 6px; }
    h3 { color: #f59e0b; margin: 22px 0 8px; font-size: 16px; }
    h4 { color: #a855f7; margin: 16px 0 6px; font-size: 14px; }
    h5, h6 { color: #67e8f9; margin: 14px 0 6px; font-size: 13px; }
    p { margin: 8px 0; font-size: 13px; }
    a { color: #67e8f9; text-decoration: none; }
    a:hover { color: #fff; text-decoration: underline; }
    code {
      background: #1f2937;
      color: #fde68a;
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 12px;
    }
    pre {
      background: #0f1216;
      border: 1px solid #1f2937;
      border-radius: 6px;
      padding: 12px 14px;
      overflow-x: auto;
      margin: 10px 0;
    }
    pre code {
      background: transparent;
      color: #cbd5e1;
      padding: 0;
      font-size: 12px;
      line-height: 1.55;
      white-space: pre;
    }
    blockquote {
      border-left: 3px solid #f59e0b;
      background: #1a1410;
      margin: 12px 0;
      padding: 6px 14px;
      color: #fbbf24;
      font-size: 13px;
    }
    blockquote p { margin: 4px 0; }
    table {
      border-collapse: collapse;
      margin: 12px 0;
      width: 100%;
      font-size: 12px;
    }
    th, td {
      border: 1px solid #1f2937;
      padding: 8px 12px;
      text-align: left;
      vertical-align: top;
    }
    th { background: #0f1a1f; color: #22c55e; font-weight: 700; }
    tr:nth-child(even) td { background: #0d1418; }
    ul, ol { padding-left: 26px; margin: 8px 0; }
    li { margin: 4px 0; font-size: 13px; }
    hr { border: 0; border-top: 1px solid #1f2937; margin: 24px 0; }
    strong { color: #fff; }
    em { color: #f9a8d4; }
    .loading, .error {
      padding: 60px 24px;
      text-align: center;
      color: #6b7280;
      font-size: 14px;
    }
    .error h1 { color: #ef4444; }
    .doc-meta {
      color: #6b7280;
      font-size: 10px;
      margin: 14px 0 22px;
      padding: 8px 14px;
      background: #0f1216;
      border-left: 3px solid #4b5563;
      border-radius: 3px;
    }
    .doc-meta a { color: #67e8f9; font-size: 10px; }
    .pages-link {
      background: rgba(15, 26, 31, 0.92);
      color: #ff4d9a !important;
      font-size: 11px;
      padding: 5px 10px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="legend.html" class="pages-link" title="Open the page legend">📑 Pages</a>
    <span style="color:#6b7280;font-size:11px;">·</span>
    <label style="font-size:11px;color:#9ca3af;">Doc:</label>
    <select id="doc-select" aria-label="Switch document"></select>
    <a id="raw-link" href="#" title="Open the raw markdown file in your browser">📝 Raw .md</a>
    <span class="lede">Web viewer for project docs · same canonical .md files, rendered live</span>
  </div>

  <div class="wrap">
    <div id="doc-content" class="loading">Loading…</div>
  </div>

  <script>
    // Whitelist of PUBLIC-FACING docs only. Internal workflow + planning
    // docs are lab-only and intentionally excluded from this viewer.
    // The whitelist itself blocks directory-traversal attacks
    // (e.g. ?doc=../../etc); defense-in-depth keeps internal docs off
    // the public renderer.
    const DOC_PATHS = {
      'README': '../README.md',
      'SETUP': '../docs/SETUP.md',
      'ARCHITECTURE': '../docs/ARCHITECTURE.md',
      'EQUATIONS': '../docs/EQUATIONS.md',
      'ROADMAP': '../docs/ROADMAP.md',
      'SKILL_TREE': '../docs/SKILL_TREE.md',
      'SENSORY': '../docs/SENSORY.md',
      'WEBSOCKET': '../docs/WEBSOCKET.md',
    };

    const selectEl = document.getElementById('doc-select');
    const rawLink = document.getElementById('raw-link');
    Object.keys(DOC_PATHS).forEach((slug) => {
      const opt = document.createElement('option');
      opt.value = slug;
      opt.textContent = slug;
      selectEl.appendChild(opt);
    });

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ──────────────────────────────────────────────────────────────
    // Minimal markdown → HTML converter. Handles the CommonMark
    // subset we use in this project: ATX headers (# … ######), fenced
    // code blocks ```lang…```, GFM tables (| col | col | with
    // |---|---| separator), unordered (- ) + ordered (1. ) lists,
    // blockquotes (> ), horizontal rules (---), and inline **bold**,
    // *italic*, `code`, [link](url). Good enough for OUR docs; edge
    // cases stay readable. The .md file remains the canonical source.
    // ──────────────────────────────────────────────────────────────
    function md2html(md) {
      // 1. Extract fenced code blocks first so other regex passes don't
      //    chew on their contents.
      const codeBlocks = [];
      md = md.replace(/```([\w-]*)\n?([\s\S]*?)```/g, (_, lang, code) => {
        codeBlocks.push({ lang: lang || '', code });
        return `\x00CODE${codeBlocks.length - 1}\x00`;
      });

      const lines = md.split('\n');
      const out = [];
      let i = 0;

      while (i < lines.length) {
        const line = lines[i];

        // ATX headers (# H1 through ###### H6).
        let hm = line.match(/^(#{1,6}) (.+)$/);
        if (hm) {
          const lvl = hm[1].length;
          out.push(`<h${lvl}>${inline(hm[2])}</h${lvl}>`);
          i++;
          continue;
        }

        // Horizontal rule (--- or *** or ___).
        if (/^[\-*_]{3,}\s*$/.test(line)) {
          out.push('<hr>');
          i++;
          continue;
        }

        // GFM table: header row then |---|---| separator then body.
        if (line.trim().startsWith('|')
            && i + 1 < lines.length
            && /^\|?\s*[:\- ]+\|/.test(lines[i + 1].trim())) {
          const header = parseTableRow(line);
          i += 2;
          const rows = [];
          while (i < lines.length && lines[i].trim().startsWith('|')) {
            rows.push(parseTableRow(lines[i]));
            i++;
          }
          out.push(renderTable(header, rows));
          continue;
        }

        // Blockquote — gather consecutive `> ` lines, recurse on inner.
        if (/^>\s*/.test(line)) {
          const bq = [];
          while (i < lines.length && /^>\s*/.test(lines[i])) {
            bq.push(lines[i].replace(/^>\s?/, ''));
            i++;
          }
          out.push(`<blockquote>${md2html(bq.join('\n'))}</blockquote>`);
          continue;
        }

        // Unordered list (- ).
        if (/^- /.test(line)) {
          const items = [];
          while (i < lines.length && /^- /.test(lines[i])) {
            items.push(inline(lines[i].slice(2)));
            i++;
          }
          out.push('<ul>' + items.map((t) => `<li>${t}</li>`).join('') + '</ul>');
          continue;
        }

        // Ordered list (1. ).
        if (/^\d+\. /.test(line)) {
          const items = [];
          while (i < lines.length && /^\d+\. /.test(lines[i])) {
            items.push(inline(lines[i].replace(/^\d+\. /, '')));
            i++;
          }
          out.push('<ol>' + items.map((t) => `<li>${t}</li>`).join('') + '</ol>');
          continue;
        }

        // Blank line — skip.
        if (line.trim() === '') { i++; continue; }

        // Paragraph — gather until blank or block-starter.
        const para = [line];
        i++;
        while (i < lines.length
               && lines[i].trim() !== ''
               && !/^(#{1,6} |>|---|\d+\. |- |```|\|)/.test(lines[i])) {
          para.push(lines[i]);
          i++;
        }
        out.push(`<p>${inline(para.join(' '))}</p>`);
      }

      let html = out.join('\n');

      // 2. Restore fenced code blocks.
      html = html.replace(/\x00CODE(\d+)\x00/g, (_, idx) => {
        const cb = codeBlocks[parseInt(idx, 10)];
        const lang = cb.lang ? ` class="lang-${escapeHtml(cb.lang)}"` : '';
        return `<pre><code${lang}>${escapeHtml(cb.code)}</code></pre>`;
      });

      return html;
    }

    function inline(s) {
      // Inline-code FIRST so its contents don't get re-processed.
      const inlineCodes = [];
      s = s.replace(/`([^`\n]+)`/g, (_, c) => {
        inlineCodes.push(c);
        return `\x01IC${inlineCodes.length - 1}\x01`;
      });
      // Escape any raw HTML in the non-code text (defense in depth).
      s = escapeHtml(s).replace(/&#0;/g, '\x00').replace(/&#1;/g, '\x01');
      // Bold **text** and __text__.
      s = s.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      s = s.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      // Italic *text* (not part of bold).
      s = s.replace(/(^|[^*])\*([^*\n]+?)\*(?!\*)/g, '$1<em>$2</em>');
      // Italic _text_ (word-boundary aware).
      s = s.replace(/(^|\W)_([^_\n]+?)_(?=\W|$)/g, '$1<em>$2</em>');
      // Links [text](url).
      s = s.replace(/\[([^\]]+)\]\(([^)\s]+)(?:\s+"([^"]+)")?\)/g, (_, text, url, title) => {
        const t = title ? ` title="${title}"` : '';
        return `<a href="${url}"${t}>${text}</a>`;
      });
      // Restore inline-code placeholders.
      s = s.replace(/\x01IC(\d+)\x01/g, (_, idx) => `<code>${escapeHtml(inlineCodes[parseInt(idx, 10)])}</code>`);
      return s;
    }

    function parseTableRow(line) {
      const trimmed = line.trim().replace(/^\|/, '').replace(/\|$/, '');
      return trimmed.split('|').map((s) => s.trim());
    }

    function renderTable(header, rows) {
      let html = '<table>';
      html += '<thead><tr>' + header.map((h) => `<th>${inline(h)}</th>`).join('') + '</tr></thead>';
      html += '<tbody>' + rows.map((r) =>
        '<tr>' + r.map((c) => `<td>${inline(c)}</td>`).join('') + '</tr>'
      ).join('') + '</tbody>';
      html += '</table>';
      return html;
    }

    // ──────────────────────────────────────────────────────────────
    // Load the doc from the whitelist.
    // ──────────────────────────────────────────────────────────────
    function showError(title, detail) {
      document.getElementById('doc-content').className = 'error';
      document.getElementById('doc-content').innerHTML =
        `<h1>${escapeHtml(title)}</h1><p>${escapeHtml(detail)}</p>`;
    }

    function loadDoc(slug) {
      const path = DOC_PATHS[slug];
      if (!path) {
        showError('Unknown doc', `No whitelist entry for "${slug}". Available: ${Object.keys(DOC_PATHS).join(', ')}`);
        return;
      }
      selectEl.value = slug;
      rawLink.href = path;
      document.title = `Unity — ${slug}`;
      const contentEl = document.getElementById('doc-content');
      contentEl.className = 'loading';
      contentEl.textContent = `Loading ${slug}…`;
      fetch(path).then((r) => {
        if (!r.ok) throw new Error(`HTTP ${r.status} fetching ${path}`);
        return r.text();
      }).then((md) => {
        contentEl.className = '';
        const meta = `<div class="doc-meta">📄 Rendered from <a href="${path}" target="_blank">${path}</a> · canonical source · web view by <a href="docs.html">docs.html</a></div>`;
        contentEl.innerHTML = meta + md2html(md);
      }).catch((err) => {
        showError(`Failed to load ${slug}`, `${err.message}. Try opening the raw file: ${path}`);
      });
    }

    // Dropdown change handler.
    selectEl.addEventListener('change', () => {
      const slug = selectEl.value;
      // Push URL state so refresh preserves the chosen doc.
      const newUrl = new URL(location.href);
      newUrl.searchParams.set('doc', slug);
      history.replaceState({}, '', newUrl);
      loadDoc(slug);
    });

    // Initial load — defaults to README when no ?doc= present.
    const params = new URLSearchParams(location.search);
    const initial = params.get('doc') || 'README';
    loadDoc(initial);
  </script>
</body>
</html>
